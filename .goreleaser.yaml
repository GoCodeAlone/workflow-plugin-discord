version: 2

before:
  hooks:
    - "mkdir -p dist"
    - "cp plugin.json dist/plugin.json"
    - "cp plugin.contracts.json dist/plugin.contracts.json"
    - "sed -i.bak 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' dist/plugin.json && rm -f dist/plugin.json.bak"
    - "sed -i.bak 's|/releases/download/v[^/]*/|/releases/download/v{{ .Version }}/|g' dist/plugin.json && rm -f dist/plugin.json.bak"
    - "go run github.com/GoCodeAlone/workflow/cmd/wfctl@v0.51.7 plugin validate --file dist/plugin.json --strict-contracts"

builds:
  - main: ./cmd/{{ .ProjectName }}
    binary: "{{ .ProjectName }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-discord/internal.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - src: dist/plugin.json
        dst: plugin.json
      - plugin.contracts.json

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  draft: true
